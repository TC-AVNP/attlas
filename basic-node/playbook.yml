---
# Worker Pi provisioning playbook
# Fetched from homelab-bootstrap via /api/register/worker
# Variables passed via -e from config.json:
#   - tls.client_cert, tls.client_key, tls.ca_cert
#   - ssh.authorized_keys[]
#   - join (k8s join config)
#   - label

- name: Provision worker Pi node
  hosts: localhost
  connection: local
  become: true

  vars:
    homelab_user: commonlisp
    homelab_home: /home/commonlisp
    k8s_version: "v1.31"
    sanitized_label: "{{ label | default('pi-worker') | lower | regex_replace('[^a-z0-9]', '-') | regex_replace('-+', '-') | regex_replace('^-|-$', '') }}"

  tasks:
    # ── Hostname from label ────────────────────────────────────────────
    - name: Set hostname from label
      hostname:
        name: "{{ sanitized_label }}"

    - name: Update /etc/hosts
      lineinfile:
        path: /etc/hosts
        regexp: '^127\.0\.1\.1'
        line: "127.0.1.1 {{ sanitized_label }}"

    # Force DHCP to re-announce new hostname immediately (otherwise
    # dnsmasq caches the old cloud-init hostname for up to 12h)
    - name: Force DHCP renewal with new hostname
      shell: nmcli general hostname "{{ sanitized_label }}" && nmcli device reapply eth0
      changed_when: true
      ignore_errors: true

    # ── SSH keys from bootstrap service ────────────────────────────────
    - name: Configure SSH authorized keys
      when: ssh is defined and ssh.authorized_keys is defined
      block:
        - name: Ensure .ssh directory
          file:
            path: "{{ homelab_home }}/.ssh"
            state: directory
            owner: "{{ homelab_user }}"
            group: "{{ homelab_user }}"
            mode: "0700"

        - name: Write authorized_keys
          copy:
            content: "{{ ssh.authorized_keys | join('\n') }}\n"
            dest: "{{ homelab_home }}/.ssh/authorized_keys"
            owner: "{{ homelab_user }}"
            group: "{{ homelab_user }}"
            mode: "0600"

    # ── Dotfiles (served from bootstrap service) ───────────────────
    # NOTE: directory name "dotfiels" intentionally matches the repo name.
    - name: Extract dotfiles
      when: dotfiles is defined and dotfiles | length > 0
      shell: |
        echo '{{ dotfiles }}' | base64 -d > /tmp/dotfiles.tar.gz
        mkdir -p {{ homelab_home }}/dotfiels
        tar -xzf /tmp/dotfiles.tar.gz -C {{ homelab_home }}/dotfiels/
        rm -f /tmp/dotfiles.tar.gz
        chown -R {{ homelab_user }}:{{ homelab_user }} {{ homelab_home }}/dotfiels
      args:
        creates: "{{ homelab_home }}/dotfiels/install.sh"

    - name: Run dotfiles installer
      when: dotfiles is defined
      become_user: "{{ homelab_user }}"
      shell: bash {{ homelab_home }}/dotfiels/install.sh
      args:
        creates: "{{ homelab_home }}/.zshrc"
      ignore_errors: true

    # ── Lock default ubuntu user ─────────────────────────────────────
    - name: Lock the default ubuntu user
      user:
        name: ubuntu
        password_lock: true
        shell: /usr/sbin/nologin
      ignore_errors: true

    # ── Kernel prerequisites ───────────────────────────────────────────
    - name: Load kernel modules
      modprobe:
        name: "{{ item }}"
      loop:
        - overlay
        - br_netfilter

    - name: Persist kernel modules
      copy:
        content: |
          overlay
          br_netfilter
        dest: /etc/modules-load.d/k8s.conf

    - name: Set sysctl for Kubernetes
      sysctl:
        name: "{{ item.key }}"
        value: "{{ item.value }}"
        sysctl_file: /etc/sysctl.d/k8s.conf
        reload: true
      loop:
        - { key: net.bridge.bridge-nf-call-iptables, value: "1" }
        - { key: net.bridge.bridge-nf-call-ip6tables, value: "1" }
        - { key: net.ipv4.ip_forward, value: "1" }

    - name: Disable swap
      shell: swapoff -a && sed -i '/\sswap\s/d' /etc/fstab
      changed_when: true

    # ── Configure containerd (pre-installed in base image) ───────────
    - name: Create containerd config directory
      file:
        path: /etc/containerd
        state: directory

    - name: Generate containerd config
      shell: containerd config default > /etc/containerd/config.toml
      args:
        creates: /etc/containerd/config.toml

    - name: Enable SystemdCgroup in containerd
      replace:
        path: /etc/containerd/config.toml
        regexp: 'SystemdCgroup = false'
        replace: 'SystemdCgroup = true'
      notify: restart containerd

    - name: Enable and start containerd
      systemd:
        name: containerd
        enabled: true
        state: started

    # ── Kubernetes (pre-installed and held in base image) ───────────
    - name: Enable kubelet
      systemd:
        name: kubelet
        enabled: true

    # ── Join the cluster ───────────────────────────────────────────────
    - name: Check if already joined
      stat:
        path: /etc/kubernetes/kubelet.conf
      register: kubelet_conf

    - name: Fail loudly if worker has no join credentials
      fail:
        msg: >
          Registration response did not include a `join` object. The bootstrap
          server needs k8s running to generate join tokens. Check if kubelet
          is active on the control plane.
      when:
        - not kubelet_conf.stat.exists
        - join is not defined or join.token is not defined

    - name: Join Kubernetes cluster
      when: not kubelet_conf.stat.exists
      shell: |
        kubeadm join {{ join.api_server_endpoint }} \
          --token {{ join.token }} \
          --discovery-token-ca-cert-hash {{ join.ca_cert_hash }} \
          {% if join.control_plane | default(false) %}
          --control-plane \
          --certificate-key {{ join.certificate_key }} \
          {% endif %}

      register: join_result
      retries: 3
      delay: 30
      until: join_result.rc == 0

    - name: Verify kubelet is healthy after join
      uri:
        url: http://127.0.0.1:10248/healthz
        return_content: true
      register: kubelet_health
      retries: 10
      delay: 6
      until: kubelet_health.status == 200 and kubelet_health.content == 'ok'
      when: join_result is defined and join_result.rc is defined and join_result.rc == 0

    - name: Notify bootstrap service of k8s join
      uri:
        url: "https://homelab.attlas.uk/api/event"
        method: POST
        body_format: json
        body:
          event: k8s_joined
        headers:
          X-Image-Token: "{{ lookup('file', '/etc/image-token') }}"
        validate_certs: true
      ignore_errors: true
      when: join_result is defined and join_result.rc is defined and join_result.rc == 0

    # ── Flush handlers so k8s + containerd are stable before continuing ──
    - name: Flush handlers (k8s must be live before continuing)
      meta: flush_handlers

    # ── Shell (pre-installed in base image) ──────────────────────────
    - name: Set zsh as default shell
      user:
        name: "{{ homelab_user }}"
        shell: /usr/bin/zsh

    # ── OTel mTLS certs (from registration response) ─────────────────
    - name: Create OTel certs directory
      file:
        path: /etc/otel-certs
        state: directory
        mode: "0755"

    - name: Write OTel client cert
      when: tls is defined and tls.client_cert is defined
      copy:
        content: "{{ tls.client_cert }}"
        dest: /etc/otel-certs/client.crt
        mode: "0644"

    - name: Write OTel client key
      when: tls is defined and tls.client_key is defined
      copy:
        content: "{{ tls.client_key }}"
        dest: /etc/otel-certs/client.key
        mode: "0600"

    - name: Write OTel CA cert
      when: tls is defined and tls.ca_cert is defined
      copy:
        content: "{{ tls.ca_cert }}"
        dest: /etc/otel-certs/ca.crt
        mode: "0644"

    # ── Temperature exporter ─────────────────────────────────────────
    # Wrapped in {% raw %} to prevent Jinja from parsing ${#BODY} as
    # a comment tag ({#). This was the root cause of playbook failures.
    - name: Install temperature exporter script
      copy:
        content: |
          {% raw %}#!/usr/bin/env bash
          while true; do
            TEMP=$(cat /sys/class/thermal/thermal_zone0/temp 2>/dev/null || echo 0)
            TEMP_C=$(echo "scale=1; $TEMP/1000" | bc)
            BODY=$(printf '# HELP node_thermal_zone_temp Temperature in Celsius\n# TYPE node_thermal_zone_temp gauge\nnode_thermal_zone_temp{zone="0"} %s\n' "$TEMP_C")
            BODY_LEN=${#BODY}
            printf "HTTP/1.1 200 OK\r\nContent-Type: text/plain\r\nContent-Length: %d\r\nConnection: close\r\n\r\n%s" \
              "$BODY_LEN" "$BODY" | nc -l -p 9101 -q 1 2>/dev/null || sleep 1
          done
          {% endraw %}
        dest: /opt/homelab/temp-exporter.sh
        mode: "0755"

    - name: Install temperature exporter service
      copy:
        content: |
          [Unit]
          Description=Temperature metrics exporter (port 9101)
          After=network.target
          [Service]
          Type=simple
          ExecStart=/opt/homelab/temp-exporter.sh
          Restart=always
          RestartSec=5
          [Install]
          WantedBy=multi-user.target
        dest: /etc/systemd/system/temp-exporter.service

    - name: Create OTel Collector config directory
      file:
        path: /etc/otelcol
        state: directory

    - name: Write OTel Collector agent config
      copy:
        content: |
          receivers:
            hostmetrics:
              collection_interval: 30s
              scrapers:
                cpu:
                memory:
                disk:
                network:
                load:
                filesystem:
            prometheus:
              config:
                scrape_configs:
                  - job_name: node_temperature
                    scrape_interval: 30s
                    static_configs:
                      - targets: ['localhost:9101']

          processors:
            batch:
              timeout: 10s
            resource:
              attributes:
                - key: node.type
                  value: pi5-worker
                  action: upsert
                - key: host.name
                  value: {{ sanitized_label }}
                  action: upsert

          exporters:
            otlphttp:
              endpoint: https://otel.attlas.uk:4318
              tls:
                cert_file: /etc/otel-certs/client.crt
                key_file: /etc/otel-certs/client.key
                ca_file: /etc/otel-certs/ca.crt

          service:
            pipelines:
              metrics:
                receivers: [hostmetrics, prometheus]
                processors: [resource, batch]
                exporters: [otlphttp]
        dest: /etc/otelcol/config.yaml

    - name: Install OTel Collector agent service
      copy:
        content: |
          [Unit]
          Description=OpenTelemetry Collector Agent
          After=network-online.target temp-exporter.service
          Wants=network-online.target
          [Service]
          Type=simple
          ExecStart=/usr/local/bin/otelcol-contrib --config=/etc/otelcol/config.yaml
          Restart=always
          RestartSec=10
          [Install]
          WantedBy=multi-user.target
        dest: /etc/systemd/system/otelcol-agent.service

    # ── Healthz daemon ─────────────────────────────────────────────────
    # Also wrapped in {% raw %} for ${#RESPONSE}
    - name: Install healthz script
      copy:
        content: |
          {% raw %}#!/usr/bin/env bash
          while true; do
            RESPONSE=$(printf '{"status":"ok","hostname":"%s","uptime":"%s","load":"%s"}' \
              "$(hostname)" "$(uptime -p)" "$(cat /proc/loadavg | cut -d' ' -f1-3)")
            printf "HTTP/1.1 200 OK\r\nContent-Type: application/json\r\nContent-Length: %d\r\nConnection: close\r\n\r\n%s" \
              "${#RESPONSE}" "$RESPONSE" | nc -l -p 9100 -q 1 2>/dev/null || sleep 1
          done
          {% endraw %}
        dest: /opt/homelab/healthz.sh
        mode: "0755"

    - name: Install healthz systemd unit
      copy:
        content: |
          [Unit]
          Description=Homelab node healthz (port 9100)
          After=network.target
          [Service]
          Type=simple
          ExecStart=/opt/homelab/healthz.sh
          Restart=always
          RestartSec=5
          [Install]
          WantedBy=multi-user.target
        dest: /etc/systemd/system/homelab-healthz.service

    # ── SSH key refresh timer ──────────────────────────────────────────
    - name: Install refresh-config script
      copy:
        content: |
          #!/usr/bin/env bash
          BOOTSTRAP_URL="https://homelab.attlas.uk"
          RESPONSE=$(curl -sf --connect-timeout 5 --max-time 10 \
            --cert /etc/otel-certs/client.crt --key /etc/otel-certs/client.key \
            "${BOOTSTRAP_URL}/api/config" 2>/dev/null) || exit 0
          NEW_KEYS=$(echo "$RESPONSE" | jq -r '.ssh.authorized_keys[]? // empty' 2>/dev/null)
          if [[ -z "$NEW_KEYS" ]]; then exit 0; fi
          USER_HOME="/home/commonlisp"
          CURRENT_KEYS=""
          if [[ -f "${USER_HOME}/.ssh/authorized_keys" ]]; then
            CURRENT_KEYS=$(cat "${USER_HOME}/.ssh/authorized_keys")
          fi
          if [[ "$NEW_KEYS" != "$CURRENT_KEYS" ]]; then
            mkdir -p "${USER_HOME}/.ssh"
            echo "$NEW_KEYS" > "${USER_HOME}/.ssh/authorized_keys"
            chmod 700 "${USER_HOME}/.ssh"
            chmod 600 "${USER_HOME}/.ssh/authorized_keys"
            chown -R commonlisp:commonlisp "${USER_HOME}/.ssh"
            logger -t homelab-refresh "SSH keys updated"
          fi
        dest: /opt/homelab/refresh-config.sh
        mode: "0755"

    - name: Install refresh timer units
      copy:
        content: |
          [Unit]
          Description=Poll bootstrap service for config updates every 30s
          [Timer]
          OnBootSec=30
          OnUnitActiveSec=30
          AccuracySec=5
          [Install]
          WantedBy=timers.target
        dest: /etc/systemd/system/homelab-refresh.timer

    - name: Install refresh service unit
      copy:
        content: |
          [Unit]
          Description=Homelab config refresh
          [Service]
          Type=oneshot
          ExecStart=/opt/homelab/refresh-config.sh
        dest: /etc/systemd/system/homelab-refresh.service

    # ── Enable + start all services ──────────────────────────────────
    # Explicit enable+start is more reliable than handler-only approach.
    - name: Enable + start core services
      systemd:
        name: "{{ item }}"
        enabled: true
        state: started
        daemon_reload: true
      loop:
        - temp-exporter
        - otelcol-agent
        - homelab-healthz
        - homelab-refresh.timer

    # ── Remove bootstrap WiFi ────────────────────────────────────────
    - name: Remove bootstrap WiFi connection
      file:
        path: /etc/NetworkManager/system-connections/bootstrap-wifi.nmconnection
        state: absent
      ignore_errors: true

    # ── Notify bootstrap service that provisioning is complete ──────
    - name: Notify bootstrap service of provisioning complete
      uri:
        url: "https://homelab.attlas.uk/api/event"
        method: POST
        body_format: json
        body:
          event: provisioned_complete
        headers:
          X-Image-Token: "{{ lookup('file', '/etc/image-token') }}"
        validate_certs: true
      ignore_errors: true

  handlers:
    - name: restart containerd
      systemd:
        name: containerd
        state: restarted

    - name: start healthz
      systemd:
        name: homelab-healthz
        enabled: true
        state: started
        daemon_reload: true

    - name: start temp exporter
      systemd:
        name: temp-exporter
        enabled: true
        state: started
        daemon_reload: true

    - name: start otelcol agent
      systemd:
        name: otelcol-agent
        enabled: true
        state: started
        daemon_reload: true
