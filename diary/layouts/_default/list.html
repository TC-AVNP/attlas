{{ define "main" }}
<h1>{{ .Title }}</h1>
{{ range .Pages.ByDate.Reverse }}
<div style="margin-bottom: 1.5rem; padding: 1rem; background: #1a1a2e; border-radius: 6px;">
    <a href="{{ .RelPermalink }}" style="font-size: 1.1rem; font-weight: 600;">{{ .Title }}</a>
    <div style="color: #666; font-size: 0.85rem; margin-top: 0.3rem;">{{ .Date.Format "2006-01-02" }}</div>
    {{ with .Params.summary }}<div style="color: #888; margin-top: 0.4rem;">{{ . }}</div>{{ end }}
</div>
{{ end }}
{{ end }}
