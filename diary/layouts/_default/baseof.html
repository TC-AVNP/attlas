<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ if .IsHome }}attlas{{ else }}attlas — {{ .Title }}{{ end }}</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'JetBrains Mono', monospace;
               background: #0c0c0c; color: #c0c0c0; line-height: 1.7; font-size: 14px; }
        .container { max-width: 900px; margin: 0 auto; padding: 1.5rem; }
        a { color: #00ff00; text-decoration: none; }
        a:hover { text-decoration: underline; }
        h1 { color: #ff8700; font-size: 1.4rem; font-weight: 700; }
        h2 { color: #ffff00; font-size: 1.1rem; margin: 1.8rem 0 0.6rem;
             border-bottom: 1px solid #333; padding-bottom: 0.3rem; }
        h3 { color: #ff8700; font-size: 1rem; margin: 1.2rem 0 0.4rem; }
        p { margin-bottom: 0.8rem; }
        ul, ol { margin: 0.4rem 0 0.8rem 1.5rem; }
        li { margin-bottom: 0.2rem; }
        code { background: #1a1a1a; padding: 0.1rem 0.4rem; border-radius: 2px;
               color: #00ff00; font-family: inherit; font-size: 0.95em; }
        strong { color: #ff8700; }
        em { color: #8a8a8a; font-style: normal; }
        blockquote { border-left: 3px solid #ff8700; padding-left: 1rem; color: #8a8a8a; margin: 0.8rem 0; }
        .prompt { color: #ff8700; }
        .path { color: #00ff00; }
        .gray { color: #8a8a8a; }
        .header { padding: 1rem 0; margin-bottom: 1rem; border-bottom: 1px solid #333; }
        .header-line { display: flex; align-items: baseline; gap: 0.5rem; }
        .header a { color: #ff8700; font-size: 1.2rem; font-weight: 700; }
        .header .gray { font-size: 0.85rem; }
        .back { display: inline-block; margin-bottom: 1rem; color: #8a8a8a; font-size: 0.85rem; }
        .back:hover { color: #00ff00; }
        hr { border: none; border-top: 1px solid #333; margin: 1.5rem 0; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="{{ .Site.BaseURL }}" style="text-decoration: none; color: inherit;">
                <span class="prompt">Attlas diary</span>
                <span>🚀</span>
            </a>
        </div>
        {{ block "main" . }}{{ end }}
    </div>
</body>
</html>
