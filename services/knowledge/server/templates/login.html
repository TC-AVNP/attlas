<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>login — knowledge</title>
<style>
:root {
  --bg: #0c0c0c; --fg: #c0c0c0; --border: #333; --accent: #00ff00;
  --brand: #ff8700; --surface: #1a1a1a; --muted: #8a8a8a;
  --font-ui: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --font-mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--fg); font-family: var(--font-ui); display: flex; align-items: center; justify-content: center; min-height: 100vh; }
.box { text-align: center; }
h1 { font-family: var(--font-mono); color: var(--brand); font-size: 1.4rem; margin-bottom: 1.5rem; }
a { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.7rem 1.5rem; border: 1px solid var(--accent); border-radius: 6px; color: var(--accent); font-family: var(--font-mono); font-size: 0.9rem; text-decoration: none; transition: all 0.12s; }
a:hover { background: var(--accent); color: #000; }
</style>
</head>
<body>
<div class="box">
  <h1>knowledge graph</h1>
  <a href="/auth/login">sign in with Google</a>
</div>
</body>
</html>
