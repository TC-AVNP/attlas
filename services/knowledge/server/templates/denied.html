<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>access denied — knowledge</title>
<style>
:root {
  --bg: #0c0c0c; --fg: #c0c0c0; --danger: #ff5555; --muted: #8a8a8a;
  --font-ui: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --font-mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--fg); font-family: var(--font-ui); display: flex; align-items: center; justify-content: center; min-height: 100vh; }
.box { text-align: center; }
h1 { font-family: var(--font-mono); color: var(--danger); font-size: 1.4rem; margin-bottom: 0.5rem; }
p { color: var(--muted); font-size: 0.9rem; }
</style>
</head>
<body>
<div class="box">
  <h1>access denied</h1>
  <p>Your account is not authorized to access the knowledge graph.</p>
</div>
</body>
</html>
