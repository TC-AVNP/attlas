<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Access Denied</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f5f0eb;
    color: #2d2a26;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 1rem;
  }
  .card {
    background: #fff;
    border-radius: 16px;
    padding: 3rem 2.5rem;
    text-align: center;
    max-width: 400px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
  }
  h1 { font-size: 1.6rem; margin-bottom: 0.5rem; color: #c0392b; }
  p { color: #6b6560; font-size: 0.95rem; }
</style>
</head>
<body>
  <div class="card">
    <h1>Access Denied</h1>
    <p>This checklist is private. Your account is not authorised to view it.</p>
  </div>
</body>
</html>
