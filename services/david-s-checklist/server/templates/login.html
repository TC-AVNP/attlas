<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>David's Checklist</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f5f0eb;
    color: #2d2a26;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 1rem;
  }
  .card {
    background: #fff;
    border-radius: 16px;
    padding: 3rem 2.5rem;
    text-align: center;
    max-width: 400px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
  }
  h1 { font-size: 1.6rem; margin-bottom: 0.5rem; }
  p { color: #6b6560; margin-bottom: 2rem; font-size: 0.95rem; }
  a.btn {
    display: inline-block;
    background: #4285f4;
    color: #fff;
    text-decoration: none;
    padding: 0.75rem 2rem;
    border-radius: 8px;
    font-size: 1rem;
    font-weight: 500;
    transition: background 0.2s;
  }
  a.btn:hover { background: #3367d6; }
</style>
</head>
<body>
  <div class="card">
    <h1>David's Checklist</h1>
    <p>Sign in with your Google account to view your tasks.</p>
    <a class="btn" href="/auth/google">Sign in with Google</a>
  </div>
</body>
</html>
