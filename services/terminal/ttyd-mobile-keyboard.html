<!-- Mobile terminal keyboard — injected before </body> by install-terminal.sh -->
<style>
/* ── Mobile keyboard ──────────────────────────────────────────────── */
#mk { display:none; position:fixed; bottom:0; left:0; right:0; z-index:9999;
  background:#1a1a1a; border-top:1px solid #333; user-select:none;
  -webkit-user-select:none; padding-bottom:env(safe-area-inset-bottom,0);
  flex-direction:column; touch-action:manipulation;
  -webkit-tap-highlight-color:transparent;
  height:34vh; }

/* ── Top bar (always visible) ───────────────────────────────────── */
#mk .bar { display:flex; gap:2px; padding:2px 2px 0; flex:0 0 auto; }
#mk .bar .k { font-size:13px; padding:8px 0; background:#252525; border-color:#3a3a3a; }

/* ── Key pages ──────────────────────────────────────────────────── */
#mk .page { display:none; flex:1; flex-direction:column; justify-content:stretch; min-height:0; }
#mk .page.active { display:flex; }

/* ── Rows ───────────────────────────────────────────────────────── */
#mk .r { display:flex; gap:2px; padding:2px 2px 0; flex:1; align-items:stretch; }
#mk .r:last-child { padding-bottom:2px; }

/* ── Keys ───────────────────────────────────────────────────────── */
#mk .k { font-family:-apple-system,'SF Pro',system-ui,sans-serif;
  font-size:16px; font-weight:400;
  min-width:0; flex:1; border-radius:5px;
  border:none; background:#434343; color:#fff;
  text-align:center; cursor:pointer; line-height:1;
  white-space:nowrap; display:flex; align-items:center; justify-content:center; }
#mk .k:active, #mk .k.act { background:#666; }
#mk .k.held { background:#7aa2f7; color:#000; font-weight:600; }
#mk .k.dark { background:#2c2c2c; color:#fff; font-size:14px; }
#mk .k.blue { background:#3478f6; color:#fff; }

/* widths */
#mk .k.w125 { flex:1.25; }
#mk .k.w15 { flex:1.5; }
#mk .k.w2 { flex:2; }
#mk .k.w25 { flex:2.5; }
#mk .k.w5 { flex:5; }

/* spacer (invisible, takes space in row to center letters) */
#mk .sp { flex:0.5; }

/* ── Toggle buttons (side-by-side) ──────────────────────────────── */
#mk-toggles { display:none; position:fixed; bottom:8px; right:8px; z-index:10000;
  flex-direction:row; gap:8px; }
@media (hover:none) and (pointer:coarse) { #mk-toggles { display:flex; } }
#mk-toggles button { width:52px; height:52px; border-radius:50%; border:1px solid #555;
  background:#222; color:#999; font-size:20px; text-align:center;
  line-height:50px; cursor:pointer; -webkit-tap-highlight-color:transparent; }
#mk-toggles button.active { color:#7aa2f7; border-color:#7aa2f7; }

/* ── Select overlay ─────────────────────────────────────────────── */
#mk-sel-overlay { display:none; position:fixed; top:0; left:0; right:0;
  bottom:34vh; z-index:10001; background:#000;
  padding:0; box-sizing:border-box;
  touch-action:auto !important;
  user-select:auto !important; -webkit-user-select:auto !important; }
#mk-sel-overlay textarea { width:100%; height:100%; box-sizing:border-box;
  font-family:'SF Mono',Menlo,Consolas,monospace;
  font-size:16px; line-height:1.4; color:#ccc; background:#000;
  white-space:pre; border:none; outline:none; resize:none;
  padding:8px; margin:0;
  touch-action:auto !important;
  user-select:text !important; -webkit-user-select:text !important; }
body.mk-selecting #mk-sel-overlay { display:block; }
/* toast */
#mk-toast { display:none; position:fixed; top:20%; left:50%; transform:translateX(-50%);
  z-index:10001; background:#333; color:#fff; padding:12px 24px;
  border-radius:8px; font-size:16px; pointer-events:none; }

/* ── Voice/text input modal ────────────────────────────────────── */
#mk-input-modal { display:none; position:fixed; top:0; left:0; right:0; bottom:0;
  z-index:10002; background:#000; flex-direction:column; }
#mk-input-modal.open { display:flex; }
#mk-input-modal textarea { flex:1; width:100%; box-sizing:border-box;
  font-family:'SF Mono',Menlo,Consolas,monospace;
  font-size:18px; line-height:1.5; color:#ccc; background:#000;
  border:none; outline:none; resize:none; padding:12px; margin:0; }
#mk-input-modal .mk-input-bar { display:flex; gap:8px; padding:8px;
  background:#1a1a1a; border-top:1px solid #333;
  padding-bottom:env(safe-area-inset-bottom,8px); }
#mk-input-modal .mk-input-bar button { flex:1; padding:18px 0;

#mk-input-modal .mk-input-bar .mk-send { background:#3478f6; color:#fff; }
#mk-input-modal .mk-input-bar .mk-cancel { background:#333; color:#ccc; }

/* ── Desktop top-right buttons (scroll + close) ───────────────── */
#mk-desktop-btns { position:fixed; top:12px; right:12px; z-index:9999;
  display:flex; gap:8px; }
@media (hover:none) and (pointer:coarse) { #mk-desktop-btns { display:none; } }

#mk-close-desktop { color:#e06c75 !important; }

/* ── Close session modal ───────────────────────────────────────── */

<script>
(function() {
  'use strict';

  var kb = document.getElementById('mk');
  var toggleCustom = document.getElementById('mk-toggle-custom');
  var toggleNative = document.getElementById('mk-toggle-native');
  var toggles = document.getElementById('mk-toggles');
  if (!kb || !toggleCustom || !toggleNative) return;
  if (!window.matchMedia('(hover:none) and (pointer:coarse)').matches) return;

  // ── State ────────────────────────────────────────────────────────
  var mods = { ctrl: false, alt: false, shift: false };
  var btnCtrl  = document.getElementById('mk-ctrl');
  var btnAlt   = document.getElementById('mk-alt');
  var btnShift = document.getElementById('mk-shift');
  var currentPage = 'abc';

  // ── Send data to the terminal ────────────────────────────────────
  function send(data) {
    var t = window.term;
    if (!t) return;
    if (t._core && t._core.coreService) {
      t._core.coreService.triggerDataEvent(data, true);
    } else if (t._core && t._core._onData) {
      t._core._onData.fire(data);
    }
  }

  // ── Pages ────────────────────────────────────────────────────────
  function showPage(name) {
    currentPage = name;
    kb.querySelectorAll('.page').forEach(function(p) {
      p.classList.toggle('active', p.id === 'mk-' + name);
    });
  }

  // ── Modifier helpers ─────────────────────────────────────────────
  function setMod(name, val) {
    mods[name] = val;
    var btn = name === 'ctrl' ? btnCtrl : name === 'alt' ? btnAlt : btnShift;
    if (btn) btn.classList.toggle('held', val);
    if (name === 'shift') updateLabels();
  }
  function releaseMods() { setMod('ctrl',false); setMod('alt',false); setMod('shift',false); }

  function updateLabels() {
    var shifted = mods.shift;
    kb.querySelectorAll('#mk-abc .k[data-c]').forEach(function(btn) {
      var c = btn.getAttribute('data-c');
      if (c.length === 1 && c >= 'a' && c <= 'z') {
        btn.textContent = shifted ? c.toUpperCase() : c;
      }
    });
    if (btnShift) btnShift.classList.toggle('held', shifted);
  }

  // ── Special key sequences ────────────────────────────────────────
  var fnSeqs = {
    1:'\x1bOP', 2:'\x1bOQ', 3:'\x1bOR', 4:'\x1bOS',
    5:'\x1b[15~', 6:'\x1b[17~', 7:'\x1b[18~', 8:'\x1b[19~',
    9:'\x1b[20~', 10:'\x1b[21~', 11:'\x1b[23~', 12:'\x1b[24~'
  };
  var keySeqs = {
    esc:'\x1b', tab:'\x09', enter:'\r', bksp:'\x7f', space:' ', del:'\x1b[3~',
    up:'\x1b[A', down:'\x1b[B', left:'\x1b[D', right:'\x1b[C',
    home:'\x1b[H', end:'\x1b[F', pgup:'\x1b[5~', pgdn:'\x1b[6~',
    ins:'\x1b[2~'
  };

  // ── Key press handler ────────────────────────────────────────────
  function handleKey(btn) {
    // Page switch
    var page = btn.getAttribute('data-page');
    if (page) { showPage(page); return; }

    // Modifier toggle
    var mod = btn.getAttribute('data-mod');
    if (mod) { setMod(mod, !mods[mod]); return; }

    // Function key
    var fn = btn.getAttribute('data-fn');
    if (fn && fnSeqs[fn]) { send(fnSeqs[fn]); releaseMods(); return; }

    // Special key
    var special = btn.getAttribute('data-key');
    if (special && keySeqs[special]) { send(keySeqs[special]); releaseMods(); return; }

    // Character key
    var c = btn.getAttribute('data-c');
    if (!c) return;

    var ch = c;
    if (mods.shift && c.length === 1 && c >= 'a' && c <= 'z') {
      ch = c.toUpperCase();
    }
    if (mods.ctrl) {
      var upper = ch.toUpperCase();
      if (upper >= 'A' && upper <= 'Z') {
        send(String.fromCharCode(upper.charCodeAt(0) - 64));
      } else if (ch === '[') { send('\x1b'); }
      else if (ch === '\\') { send('\x1c'); }
      else if (ch === ']') { send('\x1d'); }
      else if (ch === '/') { send('\x1f'); }
      else if (ch === ' ') { send('\x00'); }
      else { send(ch); }
      releaseMods();
      return;
    }
    if (mods.alt) {
      send('\x1b' + ch);
      releaseMods();
      return;
    }
    send(ch);
    if (mods.shift) setMod('shift', false);
  }

  // ── Event delegation ─────────────────────────────────────────────
  kb.addEventListener('touchstart', function(e) {
    var btn = e.target.closest('.k');
    if (!btn) return;
    e.preventDefault();
    btn.classList.add('act');
    handleKey(btn);
  }, { passive: false });

  kb.addEventListener('touchend', function(e) {
    var btn = e.target.closest('.k');
    if (btn) btn.classList.remove('act');
  });

  kb.addEventListener('click', function(e) {
    var btn = e.target.closest('.k');
    if (!btn) return;
    handleKey(btn);
  });

  // ── Toggle custom HTML keyboard ──────────────────────────────────
  var kbVisible = false;
  function updateKbVisibility() {
    kb.style.display = kbVisible ? 'flex' : 'none';
    document.body.classList.toggle('mk-open', kbVisible);
    toggleCustom.classList.toggle('active', kbVisible);
    if (toggles) {
      toggles.style.bottom = kbVisible ? 'calc(34vh + 8px)' : '8px';
    }
    if (window.term && window.term.fit) {
      setTimeout(function() { window.term.fit(); }, 50);
    }
  }

  toggleCustom.addEventListener('click', function(e) {
    e.preventDefault();
    kbVisible = !kbVisible;
    updateKbVisibility();
  });

  // ── Text input modal (for speech-to-text / native keyboard) ─────
  var inputModal = document.getElementById('mk-input-modal');
  var inputText = document.getElementById('mk-input-text');
  var inputSend = document.getElementById('mk-input-send');
  var inputCancel = document.getElementById('mk-input-cancel');

  function openInputModal() {
    inputText.value = '';
    inputModal.classList.add('open');
    toggleNative.classList.add('active');
    // Small delay so the modal is visible before focusing (triggers native kb)
    setTimeout(function() { inputText.focus(); }, 100);
  }

  function closeInputModal() {
    inputModal.classList.remove('open');
    toggleNative.classList.remove('active');
    inputText.blur();
  }

  function sendInputAndClose() {
    var text = inputText.value;
    if (text) {
      send(text);
      send('\r');
    }
    closeInputModal();
  }

  toggleNative.addEventListener('click', function(e) {
    e.preventDefault();
    openInputModal();
  });

  if (inputSend) inputSend.addEventListener('click', function(e) {
    e.preventDefault();
    sendInputAndClose();
  });

  if (inputCancel) inputCancel.addEventListener('click', function(e) {
    e.preventDefault();
    closeInputModal();
  });

  function init() {
    if (!window.term) { setTimeout(init, 200); return; }
    // Suppress the native phone keyboard by default.
    var ta = document.querySelector('.xterm-helper-textarea');
    if (ta) {
      ta.setAttribute('inputmode', 'none');
      ta.setAttribute('readonly', '');
    }
    updateKbVisibility();
  }
  init();

  // ── Scroll (tmux copy-mode) — mobile bar button ──────────────────
  var scrollBtn = document.getElementById('mk-scroll');
  if (scrollBtn) {
    scrollBtn.addEventListener('touchstart', function(e) {
      e.preventDefault(); window._mkToggleScroll();
    }, { passive: false });
    scrollBtn.addEventListener('click', function() { window._mkToggleScroll(); });
  }

  // ── Internal buffer for Sel / Copy / Paste ───────────────────────
  var selBtn = document.getElementById('mk-sel');
  var copyBtn = document.getElementById('mk-copy');
  var pasteBtn = document.getElementById('mk-paste');
  var selOverlay = document.getElementById('mk-sel-overlay');
  var selText = document.getElementById('mk-sel-text');
  var toastEl = document.getElementById('mk-toast');
  var selecting = false;
  var buffer = '';  // internal copy-paste buffer, no clipboard API needed

  function extractTerminalText() {
    var t = window.term;
    if (!t) return '';
    var buf = t.buffer.active;
    var lines = [];
    for (var i = 0; i < buf.length; i++) {
      var line = buf.getLine(i);
      if (line) lines.push(line.translateToString(true));
    }
    while (lines.length && lines[lines.length - 1].trim() === '') lines.pop();
    return lines.join('\n');
  }

  function showToast(msg) {
    if (!toastEl) return;
    toastEl.textContent = msg;
    toastEl.style.display = 'block';
    setTimeout(function() { toastEl.style.display = 'none'; }, 1500);
  }

  // Sel: open/close the selection overlay
  function toggleSelect() {
    selecting = !selecting;
    document.body.classList.toggle('mk-selecting', selecting);
    selBtn.classList.toggle('held', selecting);
    if (selecting) {
      selText.value = extractTerminalText();
      selText.focus({ preventScroll: true });
      selText.blur();
      setTimeout(function() { selText.scrollTop = selText.scrollHeight; }, 50);
    }
  }

  if (selBtn) {
    selBtn.addEventListener('touchstart', function(e) {
      e.preventDefault(); toggleSelect();
    }, { passive: false });
    selBtn.addEventListener('click', function() { toggleSelect(); });
  }

  // Copy: grab selected text from the Sel textarea into the internal buffer.
  // If nothing is selected, copy everything.
  if (copyBtn) {
    function doCopy() {
      if (selecting) {
        var start = selText.selectionStart;
        var end = selText.selectionEnd;
        if (start !== end) {
          buffer = selText.value.substring(start, end);
        } else {
          buffer = selText.value;
        }
      } else {
        buffer = extractTerminalText();
      }
      if (buffer) {
        var lines = buffer.split('\n').length;
        var chars = buffer.length;
        showToast('copied ' + chars + ' chars (' + lines + ' lines)');
      } else {
        showToast('nothing to copy');
      }
    }
    copyBtn.addEventListener('touchstart', function(e) {
      e.preventDefault(); doCopy();
    }, { passive: false });
    copyBtn.addEventListener('click', function() { doCopy(); });
  }

  // Paste: send the internal buffer to the terminal
  if (pasteBtn) {
    function doPaste() {
      if (buffer) {
        send(buffer);
        showToast('pasted ' + buffer.length + ' chars');
      } else {
        showToast('buffer empty — use Copy first');
      }
    }
    pasteBtn.addEventListener('touchstart', function(e) {
      e.preventDefault(); doPaste();
    }, { passive: false });
    pasteBtn.addEventListener('click', function() { doPaste(); });
  }

  // ── Intercept native keyboard when modifiers are held ────────────
  document.addEventListener('keydown', function(e) {
    if (!mods.ctrl && !mods.alt) return;
    if (e.key.length !== 1) return;
    e.preventDefault();
    e.stopPropagation();
    var ch = e.key;
    if (mods.ctrl) {
      send(String.fromCharCode(ch.toUpperCase().charCodeAt(0) - 64));
    } else if (mods.alt) {
      send('\x1b' + ch);
    }
    releaseMods();
  }, true);
})();
</script>

<!-- Scroll toggle — runs on ALL devices (desktop + mobile) -->
<script>
(function() {
  'use strict';

  function sendToTerm(data) {
    var t = window.term;
    if (!t) return;
    if (t._core && t._core.coreService) {
      t._core.coreService.triggerDataEvent(data, true);
    } else if (t._core && t._core._onData) {
      t._core._onData.fire(data);
    }
  }

  var scrollBtn = document.getElementById('mk-scroll');
  var scrollBtnDesktop = document.getElementById('mk-scroll-desktop');
  var scrollBtnMobile = document.getElementById('mk-scroll-mobile');
  var scrolling = false;

  window._mkToggleScroll = function() {
    scrolling = !scrolling;
    if (scrollBtn) scrollBtn.classList.toggle('held', scrolling);
    if (scrollBtnDesktop) scrollBtnDesktop.classList.toggle('held', scrolling);
    if (scrollBtnMobile) scrollBtnMobile.classList.toggle('active', scrolling);
    if (scrolling) {
      sendToTerm('\x02[');
    } else {
      sendToTerm('q');
    }
  };

  if (scrollBtnDesktop) {
    scrollBtnDesktop.addEventListener('click', function() { window._mkToggleScroll(); });
  }

  if (scrollBtnMobile) {
    scrollBtnMobile.addEventListener('touchstart', function(e) {
      e.preventDefault(); window._mkToggleScroll();
    }, { passive: false });
    scrollBtnMobile.addEventListener('click', function() { window._mkToggleScroll(); });
  }
})();
</script>

<!-- Close session — sends goodbye, waits for diary, offers to close tab -->
<script>
(function() {
  'use strict';

  var closeModal = document.getElementById('mk-close-modal');
  var closeTitle = document.getElementById('mk-close-title');
  var closeMsg   = document.getElementById('mk-close-msg');
  var confirmBtn = document.getElementById('mk-close-confirm');
  var cancelBtn  = document.getElementById('mk-close-cancel');
  var closeBtnD  = document.getElementById('mk-close-desktop');
  var closeBtnM  = document.getElementById('mk-close-mobile');

  if (!closeModal) return;

  function sendToTerm(data) {
    var t = window.term;
    if (!t) return;
    if (t._core && t._core.coreService) {
      t._core.coreService.triggerDataEvent(data, true);
    } else if (t._core && t._core._onData) {
      t._core._onData.fire(data);
    }
  }

  var active = false;

  function cleanup() {
    closeModal.classList.remove('open');
    active = false;
  }

  function initiateClose() {
    if (active) return;
    active = true;

    // Invoke the /bye skill which writes diary, commits, and pushes
    sendToTerm('/bye\r');

    // Show confirmation popup — user decides when /bye is done
    closeTitle.textContent = 'Session closing\u2026';
    closeMsg.textContent = 'Once Claude finishes the diary entry, close the session.';
    confirmBtn.disabled = false;
    closeModal.classList.add('open');
  }

  if (closeBtnD) closeBtnD.addEventListener('click', initiateClose);
  if (closeBtnM) {
    closeBtnM.addEventListener('touchstart', function(e) {
      e.preventDefault(); initiateClose();
    }, { passive: false });
    closeBtnM.addEventListener('click', initiateClose);
  }

  if (confirmBtn) confirmBtn.addEventListener('click', function() {
    // Exit Claude Code CLI first, then kill the shell (and tmux session)
    sendToTerm('/exit\r');
    setTimeout(function() {
      sendToTerm('exit\r');
    }, 1000);
    cleanup();
    // Give time for both exits before trying to close the tab
    setTimeout(function() { window.close(); }, 2000);
    // window.close() only works for script-opened windows.
    // If it didn't work, tell the user.
    setTimeout(function() {
      closeTitle.textContent = 'Please close this tab manually';
      closeMsg.textContent = 'The browser only allows tabs opened by scripts to be closed automatically.';
      confirmBtn.style.display = 'none';
      cancelBtn.textContent = 'OK';
      closeModal.classList.add('open');
      active = true;
    }, 500);
  });

  if (cancelBtn) cancelBtn.addEventListener('click', function() {
    cleanup();
  });
})();
</script>
