{{ define "main" }}
{{ range .Pages.ByDate.Reverse }}
<div style="margin-bottom: 0.8rem; padding: 0.6rem 0; border-bottom: 1px solid #222;">
    <div>
        <span class="gray">{{ .Date.Format "2006-01-02" }}</span>
        <a href="{{ .RelPermalink }}">{{ .Title }}</a>
    </div>
    {{ with .Params.summary }}<div class="gray" style="margin-top: 0.2rem; font-size: 0.85rem;">{{ . }}</div>{{ end }}
</div>
{{ end }}
{{ end }}
