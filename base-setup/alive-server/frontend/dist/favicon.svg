<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke-linecap="round" stroke-linejoin="round">
  <!-- attlas: Atlas NOT holding the celestial sphere
       Palette: brand orange figure + accent green highlights on the sphere -->
  <rect width="64" height="64" fill="none"/>

  <!-- Celestial sphere floating above -->
  <circle cx="32" cy="16" r="9" fill="none" stroke="#ff8700" stroke-width="2"/>
  <!-- Equator & meridian rings -->
  <ellipse cx="32" cy="16" rx="9" ry="3" fill="none" stroke="#00ff00" stroke-width="1.1"/>
  <ellipse cx="32" cy="16" rx="3" ry="9" fill="none" stroke="#00ff00" stroke-width="1.1"/>
  <!-- A star / highlight -->
  <circle cx="32" cy="12" r="0.9" fill="#00ff00"/>
  <circle cx="28" cy="18" r="0.7" fill="#00ff00"/>
  <circle cx="36" cy="19" r="0.7" fill="#00ff00"/>

  <!-- Gap — the sphere is visibly NOT being held -->

  <!-- Atlas head -->
  <circle cx="32" cy="33" r="3.2" fill="none" stroke="#ff8700" stroke-width="2"/>

  <!-- Neck + shoulders -->
  <line x1="32" y1="36.2" x2="32" y2="39" stroke="#ff8700" stroke-width="2"/>
  <line x1="22" y1="41" x2="42" y2="41" stroke="#ff8700" stroke-width="2"/>

  <!-- Torso -->
  <line x1="32" y1="41" x2="32" y2="52" stroke="#ff8700" stroke-width="2"/>

  <!-- Arms raised, palms up but hands open and apart -->
  <line x1="22" y1="41" x2="16" y2="30" stroke="#ff8700" stroke-width="2"/>
  <line x1="42" y1="41" x2="48" y2="30" stroke="#ff8700" stroke-width="2"/>
  <!-- Open hands (visibly NOT holding the sphere above) -->
  <line x1="14" y1="30" x2="18" y2="30" stroke="#ff8700" stroke-width="2"/>
  <line x1="46" y1="30" x2="50" y2="30" stroke="#ff8700" stroke-width="2"/>

  <!-- Legs -->
  <line x1="32" y1="52" x2="26" y2="60" stroke="#ff8700" stroke-width="2"/>
  <line x1="32" y1="52" x2="38" y2="60" stroke="#ff8700" stroke-width="2"/>
</svg>
